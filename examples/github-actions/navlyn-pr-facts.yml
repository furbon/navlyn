name: Navlyn PR Facts

on:
  pull_request:

jobs:
  navlyn-facts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build Navlyn
        run: dotnet build navlyn.slnx

      - name: Write Navlyn facts
        shell: pwsh
        run: ./scripts/write-navlyn-pr-facts.ps1 -Workspace navlyn.slnx -Output artifacts/navlyn-pr-facts -Base origin/${{ github.base_ref }}

      - name: Job summary
        shell: pwsh
        run: Get-Content artifacts/navlyn-pr-facts/summary.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload facts
        uses: actions/upload-artifact@v4
        with:
          name: navlyn-pr-facts
          path: artifacts/navlyn-pr-facts
