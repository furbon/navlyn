name: Release Validation

on:
  workflow_dispatch:
  push:
    branches:
      - release/**
    tags:
      - v*

permissions:
  contents: read

concurrency:
  group: release-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Release validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Release validation
        shell: pwsh
        run: ./scripts/test-release.ps1
