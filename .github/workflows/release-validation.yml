name: Release Validation

on:
  workflow_dispatch:
  push:
    branches:
      - release/**
    tags:
      - v*

jobs:
  validate:
    name: Release validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Release validation
        shell: pwsh
        run: ./scripts/test-release.ps1
