name: Publish NuGet

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-nuget
  cancel-in-progress: false

jobs:
  publish:
    name: Publish NuGet packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: nuget-production

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Release validation
        shell: pwsh
        run: ./scripts/test-release.ps1

      - name: Pack release
        shell: pwsh
        run: ./scripts/pack-release.ps1 -NoValidation -Output artifacts/packages

      - name: Dry-run publish
        shell: pwsh
        run: ./scripts/publish-nuget.ps1 -DryRun

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: ./scripts/publish-nuget.ps1 -Publish

      - name: Upload release packages
        uses: actions/upload-artifact@v7
        with:
          name: navlyn-release-packages
          path: artifacts/packages
