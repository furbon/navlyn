name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore navlyn.slnx

      - name: Build
        run: dotnet build navlyn.slnx --no-restore

      - name: Test net8.0
        run: dotnet test navlyn.slnx --no-build --framework net8.0

      - name: Test net10.0
        run: dotnet test navlyn.slnx --no-build --framework net10.0

      - name: C# file format validation
        shell: pwsh
        run: ./scripts/test-csharp-file-format.ps1

      - name: Quick validation
        shell: pwsh
        run: ./scripts/test-quick.ps1 -NoBuild -SkipDotnetTest

      - name: CLI contract core validation
        shell: pwsh
        run: ./scripts/test-cli-contract.ps1 -NoBuild -Suite core
